# ============================================================
# NutriSight AI - Production Docker Compose
# Services: frontend (Nginx), backend (Flask+Gunicorn), redis
#
# Usage:
#   Local:   docker compose up --build
#   Deploy:  IMAGE_TAG=<sha> docker compose up -d --no-build
# ============================================================
version: '3.9'

services:

  # ── Backend: Flask API + ML Models ────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ashishjaiswal222/nutrisight-backend:${IMAGE_TAG:-latest}
    container_name: nutrisight-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - FLASK_ENV=production
      - REDIS_URL=redis://redis:6379/0
      - FRONTEND_URL=http://localhost
    volumes:
      - ./backend/logs:/app/logs
    networks:
      - nutrisight-net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 15s
      start_period: 60s
      retries: 3

  # ── Frontend: React SPA served by Nginx ───────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: ashishjaiswal222/nutrisight-frontend:${IMAGE_TAG:-latest}
    container_name: nutrisight-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - nutrisight-net
    depends_on:
      backend:
        condition: service_healthy

  # ── Redis: Caching layer ───────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nutrisight-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - nutrisight-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  nutrisight-net:
    driver: bridge

volumes:
  redis-data:

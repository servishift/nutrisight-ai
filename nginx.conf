# ============================================================
# NutriSight AI - Production Nginx Configuration
# ============================================================
user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    # ── Gzip compression ──────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Rate limiting: 20 req/s per IP for API ────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # ── Security headers ──────────────────────────────────
        add_header X-Frame-Options          "SAMEORIGIN"    always;
        add_header X-Content-Type-Options   "nosniff"       always;
        add_header X-XSS-Protection         "1; mode=block" always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

        # ── React SPA — serve index.html for all frontend routes
        location / {
            root   /usr/share/nginx/html;
            index  index.html;
            try_files $uri $uri/ /index.html;

            # Cache static assets aggressively
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # ── API proxy — forward /api/* to Flask backend ───────
        # The /api/ prefix is preserved so Flask routes work correctly.
        client_max_body_size 20m;

        location /api/ {
            limit_req zone=api_limit burst=40 nodelay;

            proxy_pass         http://backend:5000/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # Longer timeouts for ML inference (can take 5-30s)
            proxy_connect_timeout 30s;
            proxy_send_timeout    120s;
            proxy_read_timeout    120s;

            # Buffer settings for large ML responses
            proxy_buffer_size          16k;
            proxy_buffers              8 32k;
            proxy_busy_buffers_size    64k;
        }

        # ── Backend health check (no rate limit, no logging) ──
        location /health {
            proxy_pass http://backend:5000/health;
            access_log off;
            proxy_read_timeout 10s;
        }

        # ── Error pages ───────────────────────────────────────
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}
